  }

  steps() {
    return ['Subject', 'Environment', 'Look', 'Camera', 'Output', 'Review'];
  }

  dpPresets() {
    return {
      deakins:    { comp:'mc', body:'ARRI Alexa 35', framing:[],                              depth:'shallow' },
      lubezki:    { comp:'mc', body:'ARRI Alexa 35', framing:['Leading lines'],               depth:'deep' },
      hoytema:    { comp:'mc', body:'Sony Venice 2',    framing:['Negative space'],              depth:'deep' },
      fraser:     { comp:'mc', body:'Sony Venice 2', framing:[],                              depth:'shallow' },
      young:      { comp:'ml', body:'ARRI Alexa 35', framing:['Negative space'],              depth:'shallow' },
      khondji:    { comp:'mc', body:'35mm film',     framing:[],                              depth:'shallow' },
      morrison:   { comp:'mc', body:'35mm film',     framing:[],                              depth:'shallow' },
      pfister:    { comp:'mc', body:'Sony Venice 2',    framing:['Symmetrical'],                 depth:'deep' },
      anderson:   { comp:'mc', body:'35mm film',     framing:['Symmetrical'],                 depth:'deep' },
      villeneuve: { comp:'mc', body:'Sony Venice 2',    framing:['Symmetrical','Negative space'],depth:'deep' },
    };
  }
  activePreset() {
    return this.state.lookMode === 'dp' ? this.dpPresets()[this.state.dp] : null;
  }

  render() {
    const cur = this.state.step;
    const labels = this.steps();
    // header
    const hdr = document.getElementById('wizard-steps');
    if (hdr) {
      hdr.innerHTML = labels.map((label, i) => {
        const num = i + 1;
        const done = cur > num, active = cur === num;
        const isLast = i === labels.length - 1;
        const bg = done || active ? '#0217D3' : '#ECEDF0';
        const inner = done
          ? '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"></polyline></svg>'
          : '<span style="font-size:10px;font-weight:500;color:' + (active ? '#fff' : '#9A9AA8') + ';">' + num + '</span>';
        const col = active ? '#16161D' : done ? '#0217D3' : '#9A9AA8';
        const conn = done ? '#0217D3' : '#ECEDF0';
        return '<div style="display:flex;align-items:center;gap:8px;' + (isLast ? '' : 'flex:1;') + '">' +
          '<div style="width:22px;height:22px;border-radius:50%;background:' + bg + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + inner + '</div>' +
          '<span style="font-size:13px;font-weight:' + (active ? '500' : '400') + ';color:' + col + ';white-space:nowrap;">' + label + '</span>' +
          (isLast ? '' : '<div style="flex:1;height:1px;background:' + conn + ';margin:0 8px;"></div>') +
          '</div>';
      }).join('');
    }
    // progress + counter
    const bar = document.getElementById('progress-bar');
    if (bar) bar.style.width = Math.round((cur / 6) * 100) + '%';
    const counter = document.getElementById('step-counter');
    if (counter) counter.textContent = 'Step ' + cur + ' of 6';
    const back = document.getElementById('btn-back');
    if (back) back.style.visibility = cur <= 1 ? 'hidden' : 'visible';
    const next = document.getElementById('btn-next');
    if (next) next.firstChild.textContent = cur === 6 ? 'Generate stills' : 'Continue';
    // content
    const mount = document.getElementById('step-mount');
    if (mount) {
      mount.innerHTML = this.content(cur);
      mount.style.opacity = '1';
      this.bindChips();
      this.bindReviewTabs();
      this.bindControls();
    }
    this.persistBuilder();
    this.renderRail();
  }

  bindControls() {
    document.querySelectorAll('[data-refpick]').forEach(b => {
      b.onclick = () => {
        const key = b.getAttribute('data-refpick');
        const val = b.getAttribute('data-val') || null;
        if (b.getAttribute('data-multi') === '1') {
          const cur = Array.isArray(this.state[key]) ? this.state[key].slice() : [];
          const at = cur.indexOf(val);
          if (at >= 0) cur.splice(at, 1); else cur.push(val);
          this.setState({ [key]: cur });
        } else {
          this.setState({ [key]: val });
        }
        this.render();
      };
    });
    document.querySelectorAll('[data-density]').forEach(b => {
      b.onclick = () => { this.setState({ density: b.getAttribute('data-density') }); this.render(); };
    });
    document.querySelectorAll('[data-dp]').forEach(b => {
      b.onclick = () => {
        const id = b.getAttribute('data-dp');
        const p = this.dpPresets()[id];
        const patch = { dp: id };
        if (p) { patch.comp = p.comp; patch.camMode = 'specific'; patch.framing = p.framing.slice(); patch.depth = p.depth; }
        this.setState(patch); this.render();
      };
    });
    document.querySelectorAll('[data-comp]').forEach(b => {
      b.onclick = () => { this.setState({ comp: b.getAttribute('data-comp') }); this.render(); };
    });
    document.querySelectorAll('[data-sc]').forEach(b => {
      b.onclick = () => { const p = {}; p[b.getAttribute('data-sc')] = b.getAttribute('data-val'); this.setState(p); this.render(); };
    });
    document.querySelectorAll('[data-frm]').forEach(b => {
      b.onclick = () => {
        const v = b.getAttribute('data-frm');
        const set = (this.state.framing || []).slice();
        const i = set.indexOf(v);
        if (i === -1) set.push(v); else set.splice(i, 1);
        this.setState({ framing: set }); this.render();
      };
    });
    document.querySelectorAll('[data-pv]').forEach(b => {
      b.onclick = () => { this.setState({ previewView: b.getAttribute('data-pv') }); this.render(); };
    });
    document.querySelectorAll('[data-toggle]').forEach(b => {
      b.onclick = () => { const k = b.getAttribute('data-toggle'); const p = {}; p[k] = !this.state[k]; this.setState(p); this.render(); };
    });
    document.querySelectorAll('[data-text]').forEach(t => {
      t.oninput = () => { const p = {}; p[t.getAttribute('data-text')] = t.value; this.setState(p); this.persistBuilder(); this.renderRail(); };
    });
    document.querySelectorAll('[data-pin]').forEach(b => {
      b.onclick = () => { this.setState({ pinned: !this.state.pinned }); this.render(); };
    });
    document.querySelectorAll('[data-seg]').forEach(b => {
      b.onclick = () => {
        const name = b.getAttribute('data-seg'), val = b.getAttribute('data-val');
        const patch = {}; patch[name] = val;
        if (name === 'lookMode' && val === 'feel') patch.camMode = 'auto';
        if (name === 'lookMode' && val === 'dp') { const p = this.dpPresets()[this.state.dp]; if (p) { patch.comp = p.comp; patch.camMode = 'specific'; patch.framing = p.framing.slice(); patch.depth = p.depth; } }
        this.setState(patch); this.render();
      };
    });
  }

  bindReviewTabs() {
    document.querySelectorAll('[data-stage]').forEach(b => {
      b.onclick = () => { this.setState({ reviewStage: b.getAttribute('data-stage') }); this.render(); };
    });
    document.querySelectorAll('[data-model]').forEach(b => {
      b.onclick = () => {
        const id = b.getAttribute('data-model');
        if (this.state.reviewStage === 'stills') this.setState({ stillModel: id });
        else this.setState({ videoModel: id });
        this.render();
      };
    });
    const at = document.querySelector('[data-attags]');
    if (at) at.onclick = () => { this.setState({ atTags: this.state.atTags === false }); this.render(); };
  }

  bindChips() {
    document.querySelectorAll('.chip-group').forEach(group => {
      const name = group.getAttribute('data-name');
      const multi = group.getAttribute('data-multi') === '1';
      const all = Array.from(group.querySelectorAll('.chip'));
      all.forEach(chip => {
        chip.onclick = () => {
          const idx = all.indexOf(chip);
          const chips = Object.assign({}, this.state.chips || {});
          if (multi) {
            // Seed from the currently-shown selection (defaults on first touch),
            // then toggle the clicked chip.
            const cur = all.map((c, i) => i).filter(i => all[i].getAttribute('data-on') === '1');
            const at = cur.indexOf(idx);
            if (at >= 0) cur.splice(at, 1); else cur.push(idx);
            chips[name] = cur;
          } else {
            chips[name] = idx;
          }
          this.setState({ chips });
          this.render();
        };
      });
    });
  }

  eyebrow(t) {
    return '<p style="font-size:12px;font-weight:500;color:#9A9AA8;margin-bottom:8px;letter-spacing:0.02em;">' + t + '</p>';
  }
  head(t, s) {
    return '<h2 style="font-size:22px;font-weight:500;color:#16161D;margin-bottom:6px;letter-spacing:-0.01em;">' + t + '</h2>' +
      '<p style="font-size:14px;color:#5A5A6B;margin-bottom:28px;line-height:1.6;">' + s + '</p>';
  }
  field(label, control, hint) {
    return '<div style="margin-bottom:24px;">' +
      '<label style="font-size:12px;font-weight:500;color:#16161D;display:block;margin-bottom:8px;">' + label + '</label>' +
      control +
      (hint ? '<p style="font-size:12px;color:#9A9AA8;margin-top:8px;">' + hint + '</p>' : '') +
      '</div>';
  }
  chips(name, opts, multi) {
    // Selections live in this.state.chips[name] (single: index; multi: array of
    // indices) so they survive re-render / step navigation. Fall back to each
    // option's default `on` until the user has touched this group.
    const sel = (this.state.chips || {})[name];
    const isOn = (o, i) => (sel !== undefined)
      ? (multi ? (Array.isArray(sel) && sel.indexOf(i) >= 0) : (sel === i))
      : !!o.on;
    return '<div class="chip-group" data-name="' + name + '" data-multi="' + (multi ? 1 : 0) + '" style="display:flex;gap:8px;flex-wrap:wrap;">' +
      opts.map((o, i) => {
        const on = isOn(o, i);
        return '<span class="chip" data-on="' + (on ? 1 : 0) + '" style="padding:8px 14px;border:1px solid ' + (on ? '#0217D3' : 'rgba(16,16,32,0.12)') + ';border-radius:8px;font-size:13px;background:' + (on ? '#EEF0FF' : '#fff') + ';color:' + (on ? '#0217D3' : '#5A5A6B') + ';">' + o.label + '</span>';
      }).join('') + '</div>';
  }
  textarea(name, val, ph) {
    return '<textarea data-text="' + name + '" placeholder="' + (ph || '') + '" style="width:100%;height:88px;background:#fff;border:1px solid rgba(16,16,32,0.12);border-radius:10px;padding:10px 12px;font-family:\'Host Grotesk\',system-ui,sans-serif;font-size:14px;color:#16161D;resize:vertical;line-height:1.6;outline:none;">' + (val || '') + '</textarea>';
  }
  seg(name, opts, active) {
    return '<div style="display:inline-flex;gap:3px;background:#F0F1F4;border-radius:8px;padding:3px;">' +
      opts.map(o => {
        const on = o.val === active;
        return '<button data-seg="' + name + '" data-val="' + o.val + '" style="height:30px;padding:0 14px;border:none;border-radius:6px;background:' + (on ? '#fff' : 'transparent') + ';box-shadow:' + (on ? '0 1px 2px rgba(16,16,32,0.08)' : 'none') + ';font-family:inherit;font-size:13px;font-weight:500;color:' + (on ? '#16161D' : '#9A9AA8') + ';cursor:pointer;">' + o.label + '</button>';
      }).join('') + '</div>';
  }
  // Reference picker: chips of the project's references matching `kinds`.
  // Single mode stores an id (locRefId / styleRefId); multi mode stores an
  // array of ids (charRefIds / propRefIds). All woven into compilePrompt.
  attachRef(text, key, kinds, multi) {
    const a = window.Store ? Store.getActive() : null;
    const refs = (a && a.projectId && Store.listReferences) ? Store.listReferences(a.projectId).filter((r) => kinds.indexOf(r.kind) >= 0) : [];
    if (!refs.length) {
      return '<div class="opt-card" style="display:flex;align-items:center;gap:12px;border:1px dashed rgba(16,16,32,0.16);border-radius:10px;padding:12px 14px;background:#F7F5EF;"><div style="width:30px;height:30px;border-radius:7px;background:#fff;border:1px solid rgba(16,16,32,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#9A9AA8" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="12" height="10" rx="2"></rect><circle cx="6" cy="7" r="1.3"></circle><path d="M3 12l3.5-3 2.5 2 2-1.5 2 2"></path></svg></div><div><p style="font-size:13px;font-weight:500;color:#5A5A6B;">' + text + '</p><p style="font-size:12px;color:#9A9AA8;">No matching references yet — build one on the References page.</p></div></div>';
    }
    const sel = this.state[key];
    const isOn = (val) => multi ? (Array.isArray(sel) && sel.indexOf(val) >= 0) : val === (sel || null);
    const chip = (val, label) => {
      const on = isOn(val);
      return '<span class="chip" data-refpick="' + key + '" data-multi="' + (multi ? 1 : 0) + '" data-val="' + (val || '') + '" style="padding:8px 14px;border:1px solid ' + (on ? '#0217D3' : 'rgba(16,16,32,0.12)') + ';border-radius:8px;font-size:13px;background:' + (on ? '#EEF0FF' : '#fff') + ';color:' + (on ? '#0217D3' : '#5A5A6B') + ';cursor:pointer;">' + this.escHtml(label) + '</span>';
    };
    return '<div style="display:flex;gap:8px;flex-wrap:wrap;">' + (multi ? '' : chip(null, 'None')) + refs.map((r) => chip(r.id, r.name)).join('') + '</div>';
  }

  content(step) {
    if (step === 1) {
      const d = this.state.density;
      const dBtn = (val, label) => {
        const on = d === val;
        return '<button data-density="' + val + '" style="padding:8px 14px;border:1px solid ' + (on ? '#0217D3' : 'rgba(16,16,32,0.12)') + ';border-radius:8px;background:' + (on ? '#EEF0FF' : '#fff') + ';color:' + (on ? '#0217D3' : '#5A5A6B') + ';font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;">' + label + '</button>';
      };
      const densityRow = '<div style="display:flex;gap:8px;flex-wrap:wrap;">' + dBtn('single','Single subject') + dBtn('few','A few') + dBtn('crowd','Crowd') + '</div>';
      let crowdPanel = '';
      if (d === 'crowd') {
        crowdPanel =
          '<div style="background:#fff;border:1px solid rgba(2,23,211,0.16);border-radius:12px;padding:18px;margin-top:8px;">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
              '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#0217D3" stroke-width="1.5" stroke-linecap="round"><circle cx="5.5" cy="6" r="2"></circle><circle cx="10.5" cy="6" r="2"></circle><path d="M2 13c0-2 1.5-3 3.5-3s3.5 1 3.5 3M9 13c0-2 1.5-3 3.5-3"></path></svg>' +
              '<p style="font-size:13px;font-weight:500;color:#16161D;">Crowd makeup</p>' +
            '</div>' +
            '<p style="font-size:12px;color:#9A9AA8;margin-bottom:16px;line-height:1.5;">Casting guidance for representation. These steer the generation toward your brief\u2019s diversity goals \u2014 leave on \u201cRepresentative mix\u201d to mirror real local demographics.</p>' +
            this.field('Ethnicity mix', this.chips('ethnicity', [{label:'Representative mix', on:true},{label:'Reflect local demographics'},{label:'South Asian'},{label:'East Asian'},{label:'Black'},{label:'Latino / Hispanic'},{label:'White'},{label:'Middle Eastern'},{label:'Multiracial'}], true), '') +
            this.field('Gender mix', this.chips('gendermix', [{label:'Balanced', on:true},{label:'More women'},{label:'More men'},{label:'Non-binary inclusive'}], true), '') +
            this.field('Age range', this.chips('agerange', [{label:'Children'},{label:'Teens'},{label:'20s\u201330s', on:true},{label:'40s\u201350s', on:true},{label:'60s+'}], true), '') +
            this.field('Socioeconomic', this.chips('socio', [{label:'Mixed', on:true},{label:'Affluent'},{label:'Working professional'},{label:'Students'},{label:'Blue-collar'}], true), '').replace(';margin-bottom:24px;', ';margin-bottom:0;') +
          '</div>';
      }
      return this.eyebrow('Prompt · Subject') +
        this.head('What\u2019s in the shot?', 'Describe the main subject. Be specific \u2014 who or what, how many, and what they\u2019re doing.') +
        this.field('Subject description', this.textarea('subject', this.state.subject, 'Who or what is in the shot — be specific. e.g. A lone commuter crossing a downtown intersection at dawn.'), 'The clearer the subject, the more consistent your stills.') +
        this.field('Subject type', this.chips('type', [{label:'People'},{label:'Product'},{label:'Architecture'},{label:'Landscape'},{label:'Vehicle'},{label:'Abstract'}]), '') +
        this.field('Density', densityRow + crowdPanel, '') +
        this.field('Character reference &nbsp;<span style="font-weight:400;color:#9A9AA8;">optional</span>', this.attachRef('Lock a recurring face or wardrobe', 'charRefIds', ['character'], true), 'Attached refs are sent to models that support identity consistency \u2014 Nano Banana Pro, Seedream, Kling.') +
        this.field('Prop / product references &nbsp;<span style="font-weight:400;color:#9A9AA8;">optional</span>', this.attachRef('Lock a recurring prop or product', 'propRefIds', ['prop', 'product'], true), '');
    }
    if (step === 2) {
      return this.eyebrow('Prompt · Environment') +
        this.head('Set the scene', 'Where and when does this take place? Environment and light shape the whole frame.') +
        this.field('Location', this.textarea('environment', this.state.environment, 'Where and when — e.g. A modern downtown intersection, glass storefronts, wide sidewalks.'), '') +
        this.field('Time of day', this.chips('tod', [{label:'Dawn'},{label:'Golden hour'},{label:'Midday'},{label:'Dusk'},{label:'Night'}]), '') +
        this.field('Lighting', this.chips('light', [{label:'Natural'},{label:'Soft / diffused'},{label:'Hard / direct'},{label:'Practical'},{label:'Studio'}], true), 'Pick all that apply.') +
        this.field('Location reference &nbsp;<span style="font-weight:400;color:#9A9AA8;">optional</span>', this.attachRef('Lock a recurring location', 'locRefId', ['location'], false), 'Keeps the same space consistent across shots.');
    }
    if (step === 4) {
      const cm = this.state.camMode;
      const preset = this.activePreset();
      const dpLabel = preset ? (this.dpTraits().find(t => t.id === this.state.dp) || {}).label : null;
      const bodyOpts = ['ARRI Alexa 35','RED V-Raptor','Sony Venice 2','35mm film','16mm film'];
      const presetBody = preset ? preset.body : 'ARRI Alexa 35';
      let cameraField;
      if (cm === 'auto') {
        cameraField = this.chips('campick', [{label:'Filmic', on:true},{label:'Crisp digital'},{label:'Vintage'},{label:'Documentary'},{label:'Anamorphic widescreen'}]) +
          '<p style="font-size:12px;color:#9A9AA8;margin-top:8px;">Pick a feel \u2014 Studio S maps it to the right camera, stock and lens characteristics for you.</p>';
      } else {
        cameraField = this.chips('cambody', bodyOpts.map(b => ({label:b, on: b === presetBody}))) +
          '<p style="font-size:12px;color:#9A9AA8;margin-top:8px;">Body &amp; format drive sensor look, grain and depth rendering in the prompt.</p>';
      }
      const banner = preset ?
        '<div style="display:flex;gap:9px;align-items:flex-start;background:#EEF0FF;border:1px solid rgba(2,23,211,0.12);border-radius:10px;padding:12px 14px;margin-bottom:20px;">' +
          '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#0217D3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px;"><path d="M8 1.6l1.7 4 4.3.3-3.3 2.7 1.1 4.2L8 10.6 4.2 12.8l1.1-4.2L2 5.9l4.3-.3z"></path></svg>' +
          '<p style="font-size:12px;color:#5A5A6B;line-height:1.55;"><strong style="color:#16161D;">Preset from the ' + dpLabel + ' look</strong> \u2014 ' + presetBody + ', ' + this.compLabel(this.state.comp).toLowerCase() + ' placement' + (preset.framing.length ? ', ' + preset.framing.map(f => f==='lead'?'leading lines':f==='frame'?'frame within frame':f).join(' + ') : '') + '. Baked in already \u2014 only change what you want to differ.</p>' +
        '</div>' : '';
      return this.eyebrow('Prompt · Camera') +
        this.head('Frame it like a camera', 'Adjust below and watch the shot update. Anything your look already implies is preset \u2014 no need to repeat it.') +
        this.shotPreview() +
        banner +
        this.field('Shot size', this.schips('shot', [{val:'extreme',label:'Extreme CU'},{val:'close',label:'Close-up'},{val:'mcu',label:'Medium CU'},{val:'medium',label:'Medium'},{val:'mfull',label:'Medium full'},{val:'wide',label:'Wide / full'},{val:'aerial',label:'Aerial'}]), '') +
        this.field('Angle', this.schips('angle', [{val:'eye',label:'Eye level'},{val:'low',label:'Low'},{val:'high',label:'High'},{val:'dutch',label:'Dutch'}]), '') +
        this.field('Subject placement', this.compGrid(), '') +
        this.field('Depth', this.schips('depth', [{val:'shallow',label:'Shallow \u2014 subject pops'},{val:'layered',label:'Layered fore/mid/back'},{val:'deep',label:'Deep focus \u2014 all sharp'}]), '') +
        this.field('Framing', this.sframing([{val:'Symmetrical',label:'Symmetrical'},{val:'lead',label:'Leading lines'},{val:'frame',label:'Frame within a frame'},{val:'Negative space',label:'Negative space'},{val:'ots',label:'Over-the-shoulder'}]), '') +
        this.field('Lens', this.schips('lens', [{val:'16',label:'16mm'},{val:'24',label:'24mm'},{val:'35',label:'35mm'},{val:'50',label:'50mm'},{val:'85',label:'85mm'}]), '') +
        '<div style="margin-bottom:24px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><label style="font-size:12px;font-weight:500;color:#16161D;">Camera &amp; format</label>' +
          this.seg('camMode', [{val:'auto',label:'For me'},{val:'specific',label:'Specific camera'}], cm) +
          '</div>' + cameraField + '</div>' +
        this.field('Lens format', this.chips('lensformat', [{label:'Spherical', on:true},{label:'Anamorphic'}]), 'Anamorphic is a lens, not a camera body — it adds the wide squeeze, oval bokeh and horizontal flares on top of whichever body you pick.') +
        this.field('Movement', this.schips('move', [{val:'static',label:'Static'},{val:'push',label:'Slow push'},{val:'pan',label:'Pan'},{val:'tracking',label:'Tracking'},{val:'handheld',label:'Handheld'}]), 'Movement is interpreted at the image-to-video step.');
    }
    if (step === 3) {
      const lm = this.state.lookMode;
      let lookField;
      if (lm === 'dp') {
        const traits = this.dpTraits();
        const activeDp = traits.find(t => t.id === this.state.dp) || traits[0];
        const dpChips = '<div class="chip-group" data-multi="0" style="display:flex;gap:8px;flex-wrap:wrap;">' +
          traits.map(t => {
            const on = t.id === activeDp.id;
            return '<span data-dp="' + t.id + '" style="padding:8px 14px;border:1px solid ' + (on ? '#0217D3' : 'rgba(16,16,32,0.12)') + ';border-radius:8px;font-size:13px;cursor:pointer;background:' + (on ? '#EEF0FF' : '#fff') + ';color:' + (on ? '#0217D3' : '#5A5A6B') + ';">' + t.label + '</span>';
          }).join('') + '</div>';
        const last = activeDp.label;
        lookField = dpChips +
          '<div style="display:flex;gap:9px;align-items:flex-start;background:#EEF0FF;border:1px solid rgba(2,23,211,0.12);border-radius:10px;padding:12px 14px;margin-top:12px;">' +
            '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#0217D3" stroke-width="1.5" stroke-linecap="round" style="flex-shrink:0;margin-top:1px;"><circle cx="8" cy="8" r="6.5"></circle><path d="M8 7v3.5M8 5v.2"></path></svg>' +
            '<p style="font-size:12px;color:#5A5A6B;line-height:1.55;"><strong style="color:#16161D;">' + last + ' look \u2014</strong> ' + activeDp.note + ' These traits are written into the lighting &amp; colour part of every model\u2019s prompt.</p>' +
          '</div>';
      } else {
        lookField =
          this.chips('feel', [{label:'Warm &amp; natural'},{label:'Moody &amp; contrasty'},{label:'Soft &amp; dreamy'},{label:'Bold &amp; saturated'},{label:'Naturalistic doc'},{label:'Clean &amp; commercial'},{label:'Nostalgic film'}]) +
          '<p style="font-size:12px;color:#9A9AA8;margin-top:8px;">Plain-language looks \u2014 no film-school required. Studio S translates each into concrete lighting, colour and composition cues.</p>';
      }
      const realism = ['Motion blur','Film grain + CA','Lens flare','Visible breath','Dust particles','Bokeh + parallax','Wet ground','Cloth physics','Micro-texture','Natural imperfections','Candid / unposed'];
      return this.eyebrow('Prompt · Style') +
        this.head('Look &amp; cinematography', 'Pick a signature cinematography look, or describe a feel. This drives the lighting, colour and composition language in your prompts.') +
        '<div style="margin-bottom:24px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><label style="font-size:12px;font-weight:500;color:#16161D;">Cinematography look</label>' +
          this.seg('lookMode', [{val:'dp',label:'By look'},{val:'feel',label:'By feel'}], lm) +
          '</div>' + lookField + '</div>' +
        this.field('Style prefix', this.overrideToggle(), 'In Multi-Shot every shot inherits the project’s global style prefix. Turn this on to let this shot depart from it.') +
        this.field('Colour grade', this.chips('grade', [{label:'Warm'},{label:'Cool'},{label:'Muted'},{label:'High contrast'},{label:'Teal &amp; orange'},{label:'Pastel'}]), '') +
        this.field('Realism extras', this.chips('realism', realism.map((r) => ({label:r})), true), 'Optional texture &amp; physics cues for a less \u201cAI\u201d look. Applied where each model supports them.') +
        this.field('Style reference &nbsp;<span style="font-weight:400;color:#9A9AA8;">optional</span>', this.attachRef('Match a look-frame or grade', 'styleRefId', ['look'], false), '');
    }
    if (step === 5) {
      return this.eyebrow('Prompt · Output') +
        this.head('Models &amp; output', 'Studio S writes a stills prompt and an image-to-video prompt from the same brief. Pick one or more models for each stage \u2014 prompts are tailored to each.') +
        this.field('Stills model \u2014 text-to-image', this.chips('smodel', [{label:'GPT Image', on:true},{label:'Nano Banana Pro', on:true},{label:'Seedream 4.5'},{label:'FLUX.2'},{label:'Midjourney v7'}], true), 'GPT Image (ChatGPT) for prompt accuracy &amp; world knowledge, Nano Banana Pro for character consistency, Seedream for text &amp; product, FLUX.2 for photoreal, Midjourney for art direction.') +
        this.field('Video model \u2014 image-to-video', this.chips('vmodel', [{label:'Kling 3.0', on:true},{label:'Seedance'},{label:'Runway Gen-4'},{label:'Sora'},{label:'Higgsfield'}], true), 'The stills you pick are animated with these. Kling, Seedance and Nano Banana Pro run natively in Palmier too.') +
        this.field('Aspect ratio', this.chips('ar', [{label:'16:9', on:true},{label:'9:16'},{label:'1:1'},{label:'2.39:1'}]), '') +
        this.field('Stills per model', this.chips('count', [{label:'2'},{label:'4', on:true},{label:'6'},{label:'8'}]), '') +
        this.field('Negative prompt', this.textarea('negative', this.state.negative, 'Optional \u2014 what to avoid. e.g. blurry, distorted hands, text artifacts, oversaturated'), 'Optional \u2014 applies to both stages.');
    }
    // step 6 — review (per-model tailored prompts)
    const camIcon = '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#0217D3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="12" height="9" rx="2"></rect><circle cx="8" cy="8.5" r="2.2"></circle></svg>';
    const vidIcon = '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#0217D3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3.5" width="9" height="9" rx="2"></rect><path d="M11 7l3-1.8v5.6L11 9"></path></svg>';
    const stage = this.state.reviewStage;
    const isStills = stage === 'stills';
    // BUG-01 fix: show the REAL compiled prompt (per active stage), not a demo string.
    const compiled = this.compilePrompt();
    const shownPrompt = isStills ? compiled.stills : compiled.video;
    const profiles = isStills ? this.stillProfiles() : this.videoProfiles();
    const activeId = isStills ? this.state.stillModel : this.state.videoModel;
    const active = profiles.find(p => p.id === activeId) || profiles[0];
    const stillLabel = (this.stillProfiles().find(p => p.id === this.state.stillModel) || {}).label || '—';
    const videoLabel = (this.videoProfiles().find(p => p.id === this.state.videoModel) || {}).label || '—';
    const stageTab = (id, icon, label) => {
      const on = stage === id;
      return '<button data-stage="' + id + '" style="flex:1;height:34px;border:none;border-radius:7px;background:' + (on ? '#fff' : 'transparent') + ';box-shadow:' + (on ? '0 1px 2px rgba(16,16,32,0.08)' : 'none') + ';font-family:inherit;font-size:13px;font-weight:500;color:' + (on ? '#16161D' : '#9A9AA8') + ';cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">' + icon + label + '</button>';
    };
    const modelTab = (p) => {
      const on = p.id === activeId;
      return '<button data-model="' + p.id + '" style="padding:6px 12px;border:1px solid ' + (on ? '#0217D3' : 'rgba(16,16,32,0.12)') + ';border-radius:999px;background:' + (on ? '#EEF0FF' : '#fff') + ';color:' + (on ? '#0217D3' : '#5A5A6B') + ';font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;">' + p.label + '</button>';
    };
    const atOn = this.state.atTags !== false;
    const atRow = active.id !== 'higgsfield' ? '' :
      '<div style="padding:12px 18px;border-top:1px solid rgba(16,16,32,0.06);display:flex;align-items:center;justify-content:space-between;gap:12px;">' +
        '<div>' +
          '<p style="font-size:12px;font-weight:500;color:#16161D;">@ asset tags</p>' +
          '<p style="font-size:11px;color:#9A9AA8;line-height:1.5;">Address attached references by their Higgsfield @handle, keeping the description alongside.</p>' +
        '</div>' +
        '<button data-attags="1" role="switch" aria-checked="' + (atOn ? 'true' : 'false') + '" style="flex-shrink:0;width:40px;height:23px;border:none;border-radius:999px;padding:0;cursor:pointer;background:' + (atOn ? '#0217D3' : 'rgba(16,16,32,0.16)') + ';position:relative;transition:background .15s;">' +
          '<span style="position:absolute;top:2px;left:' + (atOn ? '19px' : '2px') + ';width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(16,16,32,0.2);transition:left .15s;"></span>' +
        '</button>' +
      '</div>';
    return this.eyebrow('Prompt · Review') +
      this.head('Review &amp; generate', 'Your compiled prompt, ready to run. Switch models for per-model phrasing guidance \u2014 then copy it and generate in that tool.') +
      // stage switcher
      '<div style="display:flex;gap:4px;background:#F0F1F4;border-radius:9px;padding:3px;margin-bottom:16px;">' +
        stageTab('stills', camIcon, 'Stills prompt') + stageTab('video', vidIcon, 'Video prompt') +
      '</div>' +
      // model tabs
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">' + profiles.map(modelTab).join('') + '</div>' +
      // active prompt card
      '<div style="background:#fff;border:1px solid rgba(16,16,32,0.10);border-radius:12px;overflow:hidden;margin-bottom:16px;">' +
        '<div style="padding:14px 18px;border-bottom:1px solid rgba(16,16,32,0.06);display:flex;align-items:center;justify-content:space-between;">' +
          '<span style="font-size:13px;font-weight:500;color:#16161D;">' + active.label + ' &nbsp;<span style="font-weight:400;color:#9A9AA8;">' + active.tag + '</span></span>' +
          '<span style="font-size:11px;font-weight:500;background:#E8F7F1;color:#1D9E75;padding:2px 8px;border-radius:999px;">Tailored</span>' +
        '</div>' +
        '<div style="padding:16px 18px;"><p style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;color:#16161D;line-height:1.7;">' + (shownPrompt ? this.escHtml(shownPrompt) : '<span style="color:#9A9AA8;">Fill in the earlier steps and your prompt builds here.</span>') + '</p></div>' + atRow +
        '<div style="padding:12px 18px;border-top:1px solid rgba(16,16,32,0.06);background:#F7F5EF;display:flex;gap:9px;align-items:flex-start;">' +
          '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#0217D3" stroke-width="1.5" stroke-linecap="round" style="flex-shrink:0;margin-top:1px;"><circle cx="8" cy="8" r="6.5"></circle><path d="M8 7v3.5M8 5v.2"></path></svg>' +
          '<p style="font-size:12px;color:#5A5A6B;line-height:1.55;"><strong style="color:#16161D;">Why it\u2019s tailored \u2014</strong> ' + active.rule + '</p>' +
        '</div>' +
      '</div>' +
      // generation plan \u2014 derived from the brief, no fake job state
      '<div style="background:#fff;border:1px solid rgba(16,16,32,0.10);border-radius:12px;padding:16px 18px;margin-bottom:16px;">' +
        '<p style="font-size:12px;font-weight:500;color:#16161D;margin-bottom:12px;">Generation plan</p>' +
        '<div style="display:flex;flex-direction:column;gap:10px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;">' +
            '<span style="font-size:13px;color:#5A5A6B;display:flex;align-items:center;gap:7px;">' + camIcon + 'Stills prompt</span>' +
            '<span style="font-size:12px;font-weight:500;color:#16161D;">' + stillLabel + '</span>' +
          '</div>' +
          '<div style="height:1px;background:rgba(16,16,32,0.06);"></div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between;">' +
            '<span style="font-size:13px;color:#5A5A6B;display:flex;align-items:center;gap:7px;">' + vidIcon + 'Video prompt &nbsp;<span style="font-size:11px;color:#9A9AA8;">image-to-video</span></span>' +
            '<span style="font-size:12px;font-weight:500;color:#16161D;">' + videoLabel + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:10px;align-items:center;background:#EEF0FF;border:1px solid rgba(2,23,211,0.12);border-radius:10px;padding:14px 16px;">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#0217D3" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"></circle><path d="M8 5.5v3M8 10.5v.2"></path></svg>' +
        '<p style="font-size:13px;color:#16161D;line-height:1.5;">\u201cGenerate stills\u201d saves these prompts to the shot and copies the active model\u2019s prompt \u2014 then run it in that tool. (Direct generation isn\u2019t connected yet.)</p>' +
      '</div>';
  }

  renderVals() {
    return {
      goNext: () => {
        if (this.state.step === 6) { this.generate(); return; }
        this.setState({ step: Math.min(this.state.step + 1, 6) }); this.render();
      },
      goBack: () => { this.setState({ step: Math.max(this.state.step - 1, 1) }); this.render(); },
      switchShot: (e) => {
        if (!window.Store) return;
        this.persistBuilder();
        Store.setActive({ shotId: e.currentTarget.value });
        this.seedFromActive();
        this.render();
        this.renderToolbar();
      },
      addShot: () => {
        if (!window.Store) return;
        const a = Store.getActive();
        if (!a.projectId || !a.conceptId) { window.alert('Open a project first (Projects).'); return; }
        this.persistBuilder();
        const s = Store.addShot(a.projectId, a.conceptId, { builder: Store.defaultBuilder() });
        Store.setActive({ shotId: s.id });
        this.seedFromActive();
        this.render();
        this.renderToolbar();
      },
      renameShot: () => {
        if (!window.Store || !this._ids) return;
        const a = Store.getActive();
        if (!a.shot) return;
        const inp = document.getElementById('rename-input');
        if (inp) inp.value = a.shot.name;
        const m = document.getElementById('rename-modal'); if (m) m.style.display = 'flex';
        if (inp) { inp.focus(); inp.select(); }
      },
      closeRename: () => {
        const m = document.getElementById('rename-modal'); if (m) m.style.display = 'none';
      },
      saveRename: () => {
        if (!window.Store || !this._ids) return;
        const name = ((document.getElementById('rename-input') || {}).value || '').trim();
        if (!name) return;
        Store.renameShot(this._ids.projectId, this._ids.conceptId, this._ids.shotId, name);
        const m = document.getElementById('rename-modal'); if (m) m.style.display = 'none';
        this.renderToolbar();
      }
    };
  }

  generate() {
    // No generation backend is wired — be honest, persist, and confirm.
    this.persistBuilder();
    if (window.Store && this._ids && this._ids.shotId) {
      const doc = Store.load();
      const p = doc.projects.filter((x) => x.id === this._ids.projectId)[0];
      if (p) {
        const c = (p.concepts || []).filter((x) => x.id === this._ids.conceptId)[0];
        const sh = c && (c.shots || []).filter((x) => x.id === this._ids.shotId)[0];
        if (sh) { sh.status = 'prompted'; Store.save(doc); }
      }
    }
    // BUG-02 fix: actually copy the active model's prompt (the panel promises this).
    const compiled = this.compilePrompt();
    const text = (this.state.reviewStage === 'video' ? compiled.video : compiled.stills) || compiled.stills || compiled.video || '';
    let copied = false;
    if (text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text); copied = true; }
        else { const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove(); copied = true; }
      } catch (e) { copied = false; }
    }
    const btn = document.getElementById('btn-next');
    if (btn && btn.firstChild) {
      const orig = btn.firstChild.textContent;
      btn.firstChild.textContent = copied ? 'Prompt copied ✓' : 'Prompts saved ✓';
      setTimeout(() => { if (btn.firstChild) btn.firstChild.textContent = orig; }, 1800);
    }
  }
}
</script>
<script src="./promptcompile.js"></script>
<script src="./store.js"></script>
<script src="./nav.js"></script>
</body>
</html>
